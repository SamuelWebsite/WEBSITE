<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #ffffff;
      font-family: 'Playfair Display', serif;
      overflow-x: hidden;
    }

    /* Section 1 — Hello */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hello-text {
      font-size: clamp(6rem, 20vw, 18rem);
      font-weight: 900;
      color: #000000;
      letter-spacing: -0.04em;
      line-height: 1;
      user-select: none;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeIn 1.2s ease 0.8s forwards;
    }

    .scroll-hint span {
      font-family: 'Playfair Display', serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
    }

    .scroll-arrow {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, #aaa, transparent);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scaleY(0.8); }
      50%       { opacity: 1;   transform: scaleY(1); }
    }

    /* Section 2 — Image */
    .image-section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .image-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transform: scale(1.05);
      transition: opacity 1s ease, transform 1.4s ease;
    }

    .image-wrapper img.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* Thin caption */
    .caption {
      position: absolute;
      bottom: 2rem;
      right: 2.5rem;
      font-family: 'Playfair Display', serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      opacity: 0;
      transition: opacity 1.2s ease 0.6s;
    }

    .image-wrapper img.visible ~ .caption {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Section 1 -->
  <section class="hero">
    <h1 class="hello-text">hello.</h1>
    <div class="scroll-hint">
      <span>scroll</span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- Section 2 -->
  <section class="image-section">
    <div class="image-wrapper">
      <img
        id="reveal-img"
        src="image.jpg"
        alt="Cool ass boeing 737 was supposed to show up.. oh well"
      />
      <div class="caption">somewhere beautiful</div>
    </div>
  </section>

  <script>
    const img = document.getElementById('reveal-img');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          img.classList.add('visible');
        }
      });
    }, { threshold: 0.2 });

    observer.observe(img);
  </script>

</body>
</html>
