<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel's website</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hello-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 14vw, 14rem);
      font-weight: 900;
      color: #000;
      letter-spacing: -0.04em;
      line-height: 1;
      user-select: none;
      animation: fadeUp 4s ease forwards;
    }

    /* ── CONCERTS PILL ── */
    .concerts-pill {
      position: absolute;
      top: 2rem;
      right: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem 0.5rem 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
      z-index: 10;
    }

    .concerts-pill:hover {
      border-color: #bbb;
      box-shadow: 0 2px 18px rgba(0,0,0,0.09);
      transform: translateY(-2px);
    }

    .concerts-pill-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ff4545;
      animation: blink 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .concerts-pill span {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #333;
      font-weight: 400;
    }

    /* ── SCROLL HINT ── */
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.8s forwards;
    }

    .scroll-hint span {
      font-size: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #bbb;
    }

    .scroll-arrow {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, #bbb, transparent);
      animation: pulse 1.8s ease-in-out infinite;
    }

    /* ── IMAGE SECTION ── */
    .image-section { height: 100vh; position: relative; overflow: hidden; }

    .image-wrapper { width: 100%; height: 100%; position: relative; }

    .image-wrapper img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      opacity: 0; transform: scale(1.05);
      transition: opacity 1s ease, transform 1.4s ease;
    }

    .image-wrapper img.visible { opacity: 1; transform: scale(1); }

    .image-overlay-gradient {
      position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
      background: linear-gradient(to top, rgba(0,0,0,0.78) 0%, transparent 100%);
      pointer-events: none;
    }

    .caption {
      position: absolute; top: 2rem; right: 2.5rem;
      font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(255,255,255,0.4); opacity: 0;
      transition: opacity 1.2s ease 0.6s;
    }

    .image-wrapper img.visible ~ .caption { opacity: 1; }

    /* ── CARD STRIP ── */
    .card-strip {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 3rem 2.8rem;
      opacity: 0; transform: translateY(18px);
      transition: opacity 0.9s ease 0.5s, transform 0.9s ease 0.5s;
    }

    .card-strip.visible { opacity: 1; transform: translateY(0); }

    .cards-label {
      font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 1rem;
    }

    .cards-scroll {
      display: flex; gap: 1rem; overflow-x: auto;
      padding-bottom: 0.5rem; scrollbar-width: none;
      -ms-overflow-style: none; cursor: grab;
    }

    .cards-scroll:active { cursor: grabbing; }
    .cards-scroll::-webkit-scrollbar { display: none; }

    .card {
      flex: 0 0 180px; height: 220px; border-radius: 6px;
      overflow: hidden; position: relative; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.35s ease, border-color 0.3s ease;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }

    .card:hover { transform: translateY(-7px); border-color: rgba(255,255,255,0.35); }

    .card-bg {
      position: absolute; inset: 0; background-size: cover; background-position: center;
      opacity: 0.45; transition: opacity 0.35s ease, transform 0.5s ease;
    }

    .card:hover .card-bg { opacity: 0.65; transform: scale(1.07); }

    .card-content {
      position: absolute; inset: 0; display: flex;
      flex-direction: column; justify-content: flex-end; padding: 1.2rem 1rem;
    }

    .card-number {
      font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.38); margin-bottom: 0.35rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif; font-size: 1.35rem;
      font-weight: 900; color: #fff; line-height: 1.1;
    }

    .card-arrow {
      position: absolute; top: 1rem; right: 1rem;
      width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; opacity: 0; transition: opacity 0.3s ease;
    }

    .card:hover .card-arrow { opacity: 1; }

    .card-arrow svg { width: 12px; height: 12px; stroke: #fff; fill: none; stroke-width: 2; }

    /* ── OVERLAYS ── */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.45s ease;
    }

    .overlay.open { opacity: 1; pointer-events: all; }

    .overlay-bg {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      cursor: pointer;
    }

    .overlay-panel {
      position: relative; z-index: 1;
      width: min(580px, 90vw);
      max-height: 82vh; overflow-y: auto;
      padding: 3.5rem;
      transform: translateY(32px) scale(0.97);
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      scrollbar-width: none;
    }

    .overlay-panel::-webkit-scrollbar { display: none; }
    .overlay.open .overlay-panel { transform: translateY(0) scale(1); }

    .overlay-tag {
      font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); margin-bottom: 1.2rem;
    }

    .overlay-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 900; color: #fff; line-height: 1; margin-bottom: 2rem;
    }

    .overlay-divider {
      width: 36px; height: 1px;
      background: rgba(255,255,255,0.25); margin-bottom: 2rem;
    }

    .overlay-body {
      font-size: 0.95rem; line-height: 1.8;
      color: rgba(255,255,255,0.55); font-weight: 300;
    }

    .overlay-close {
      position: fixed; top: 2rem; right: 2.5rem;
      width: 44px; height: 44px;
      border: 1px solid rgba(255,255,255,0.18); border-radius: 50%;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.25s, background 0.25s; z-index: 2;
    }

    .overlay-close:hover {
      border-color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.07);
    }

    .overlay-close svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2; }

    /* ── CONCERTS OVERLAY ── */
    #concerts-overlay .overlay-panel { width: min(700px, 94vw); padding: 3.5rem 3rem; }

    .concert-list { display: flex; flex-direction: column; }

    .concert-item {
      display: grid;
      grid-template-columns: 62px 1fr auto;
      align-items: center;
      gap: 1.2rem;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .concert-item:first-child { border-top: 1px solid rgba(255,255,255,0.06); }

    .concert-date { display: flex; flex-direction: column; align-items: center; }

    .concert-date-day {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 900; color: #fff; line-height: 1;
    }

    .concert-date-month {
      font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); margin-top: 0.15rem;
    }

    .concert-artist {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 900; color: #fff; line-height: 1.2;
    }

    .concert-venue {
      font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); margin-top: 0.2rem;
    }

    .concert-tag {
      font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.22rem 0.6rem; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.13); color: rgba(255,255,255,0.35);
      white-space: nowrap;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scaleY(0.8); }
      50%       { opacity: 1;   transform: scaleY(1); }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <h1 class="hello-text">Hello</h1>

    <button class="concerts-pill" id="concerts-btn">
      <div class="concerts-pill-dot"></div>
      <span>Paris concerts</span>
    </button>

    <div class="scroll-hint">
      <span>scroll</span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- IMAGE + CARDS -->
  <section class="image-section">
    <div class="image-wrapper">
      <img id="reveal-img" src="image.jpg" alt="Mountain landscape" />
      <div class="image-overlay-gradient"></div>
      <div class="caption"><u>"One day i wish to fly the Boeing 737"</u></div>

      <div class="card-strip" id="card-strip">
        <div class="cards-label">explore</div>
        <div class="cards-scroll" id="cards-scroll">

          <div class="card" data-page="about">
            <div class="card-bg" style="background-image:url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=400&q=70')"></div>
            <div class="card-content"><div class="card-number">01</div><div class="card-title">About</div></div>
            <div class="card-arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
          </div>

          <div class="card" data-page="work">
            <div class="card-bg" style="background-image:url('https://images.unsplash.com/photo-1558655146-d09347e92766?w=400&q=70')"></div>
            <div class="card-content"><div class="card-number">02</div><div class="card-title">Projects</div></div>
            <div class="card-arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
          </div>

          <div class="card" data-page="journal">
            <div class="card-bg" style="background-image:url('https://images.unsplash.com/photo-1455390582262-044cdead277a?w=400&q=70')"></div>
            <div class="card-content"><div class="card-number">03</div><div class="card-title">Journal</div></div>
            <div class="card-arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
          </div>

          <div class="card" data-page="photos">
            <div class="card-bg" style="background-image:url('https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400&q=70')"></div>
            <div class="card-content"><div class="card-number">04</div><div class="card-title">Photos</div></div>
            <div class="card-arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
          </div>

          <div class="card" data-page="contact">
            <div class="card-bg" style="background-image:url('https://images.unsplash.com/photo-1423528468304-edd9e4b7f06e?w=400&q=70')"></div>
            <div class="card-content"><div class="card-number">05</div><div class="card-title">Contact</div></div>
            <div class="card-arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
          </div>

        </div>
      </div>
    </div>
  </section>

  <!-- SECTION OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="overlay-bg" id="overlay-bg"></div>
    <div class="overlay-panel">
      <div class="overlay-tag" id="overlay-tag"></div>
      <div class="overlay-title" id="overlay-title"></div>
      <div class="overlay-divider"></div>
      <div class="overlay-body" id="overlay-body"></div>
    </div>
    <button class="overlay-close" id="overlay-close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- CONCERTS OVERLAY -->
  <div class="overlay" id="concerts-overlay">
    <div class="overlay-bg" id="concerts-overlay-bg"></div>
    <div class="overlay-panel">
      <div class="overlay-tag">Paris — 2026</div>
      <div class="overlay-title">Concerts</div>
      <div class="overlay-divider"></div>
      <div class="concert-list" id="concert-list"></div>
    </div>
    <button class="overlay-close" id="concerts-close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <script>
    // Reveal on scroll
    const img = document.getElementById('reveal-img');
    const strip = document.getElementById('card-strip');
    new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          img.classList.add('visible');
          setTimeout(() => strip.classList.add('visible'), 600);
        }
      });
    }, { threshold: 0.2 }).observe(img);

    // Drag scroll
    const sc = document.getElementById('cards-scroll');
    let down = false, sx, sl;
    sc.addEventListener('mousedown', e => { down = true; sx = e.pageX - sc.offsetLeft; sl = sc.scrollLeft; });
    sc.addEventListener('mouseleave', () => down = false);
    sc.addEventListener('mouseup', () => down = false);
    sc.addEventListener('mousemove', e => { if (!down) return; e.preventDefault(); sc.scrollLeft = sl - (e.pageX - sc.offsetLeft - sx) * 1.2; });

    // Section pages
    const pages = {
      about: { tag: '01 — About', title: 'About', body: `I'm a student pilot in France, i like music, aircraft, jazz & talking to new people & discovering new perspectives. I believe in projects that feels as good as it looks, thus i spend long time designing 3D models & CAD designs for flight simulators — One step at a time.\n\nThis space is where I collect things that matter to me. I'm a firm believer of the phrase "Master of none, better than master of one - <u>Robert Greene</u>", Thus this page collects all the things i have tried up until now, and it's a big list.. I've tried lots of things, such as coding, flight simulation, model airplanes, photography, hiking, traveling, soldering, electronics, homelabs, Radio controlled planes, Amateur radio (VHF), FDM printing & a LOT more :)` },
      work: { tag: '02 — Projects', title: 'Projects', body: `A selection of projects i've made (Currently INOP, Will link to portfolio)\n\nCurrently available for small CAD projects.` },
      journal: { tag: '03 — Journal', title: 'Journal', body: `Notes on cool projects i'm working on — Thoughts worth keeping.\n\nUpdated whenever i feel like it.` },
      photos: { tag: '04 — Photos', title: 'Photos', body: `A visual archive of mountains, coastlines, city corners, and quiet moments in between. Shot in digital.\nUsually just planespotting pictures. All found on my ig` },
      contact: { tag: '05 — Contact', title: 'Contact', body: `Here's my contacts if you need anything — or just want to say hello — I'd love to hear from you.\n\nReach me at sam@303.bg` }
    };

    const overlay = document.getElementById('overlay');
    function openOverlay(key) {
      const p = pages[key];
      document.getElementById('overlay-tag').textContent = p.tag;
      document.getElementById('overlay-title').textContent = p.title;
      document.getElementById('overlay-body').innerHTML = p.body.split('\n\n').map(t => `<p style="margin-bottom:1rem">${t}</p>`).join('');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeOverlay() { overlay.classList.remove('open'); document.body.style.overflow = ''; }

    document.querySelectorAll('.card').forEach(c => c.addEventListener('click', () => openOverlay(c.dataset.page)));
    document.getElementById('overlay-close').addEventListener('click', closeOverlay);
    document.getElementById('overlay-bg').addEventListener('click', closeOverlay);

    // ── Ticketmaster Live API ──
    // 👇 PASTE YOUR API KEY HERE (get one free at developer.ticketmaster.com)
    const TM_API_KEY = 'EfqELKUjh30KrY7YZfsG0TQABJl0y73F';

    const list = document.getElementById('concert-list');
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function renderConcerts(concerts) {
      list.innerHTML = '';
      if (!concerts.length) {
        list.innerHTML = `<p style="color:rgba(255,255,255,0.35);font-size:0.9rem;padding:1rem 0">No upcoming concerts found.</p>`;
        return;
      }
      concerts.forEach(c => {
        const el = document.createElement('div');
        el.className = 'concert-item';
        el.innerHTML = `
          <div class="concert-date">
            <div class="concert-date-day">${c.day}</div>
            <div class="concert-date-month">${c.month}</div>
          </div>
          <div>
            <div class="concert-artist">${c.artist}</div>
            <div class="concert-venue">${c.venue}</div>
          </div>
          <div class="concert-tag">${c.genre}</div>
        `;
        list.appendChild(el);
      });
    }

    function fetchConcerts() {
      if (TM_API_KEY === 'YOUR_API_KEY_HERE') {
        list.innerHTML = `<p style="color:rgba(255,200,80,0.7);font-size:0.85rem;padding:1rem 0;line-height:1.8">
          Paste your Ticketmaster API key into the JS to load live data.<br>
          <span style="opacity:0.45;font-size:0.75rem">developer.ticketmaster.com → My Apps → Consumer Key</span>
        </p>`;
        return;
      }
      list.innerHTML = `<p style="color:rgba(255,255,255,0.25);font-size:0.8rem;padding:1rem 0;letter-spacing:0.1em;text-transform:uppercase">Loading...</p>`;

      const callbackName = 'tmCallback_' + Date.now();
      const today = new Date().toISOString().split('T')[0] + 'T00:00:00Z';
      const url = `https://app.ticketmaster.com/discovery/v2/events.json?apikey=${TM_API_KEY}&city=Paris&countryCode=FR&classificationName=music&size=30&sort=date,asc&startDateTime=${today}&callback=${callbackName}`;

      // Set a timeout in case the request hangs
      const timeout = setTimeout(() => {
        list.innerHTML = `<p style="color:rgba(255,100,100,0.5);font-size:0.85rem;padding:1rem 0">Request timed out. Check your API key.</p>`;
        delete window[callbackName];
        script.remove();
      }, 8000);

      window[callbackName] = function(data) {
        clearTimeout(timeout);
        delete window[callbackName];
        script.remove();
        const events = data?._embedded?.events || [];
        const concerts = events.map(e => {
          const raw = e.dates?.start?.dateTime || e.dates?.start?.localDate;
          const date = new Date(raw);
          const genre = e.classifications?.[0]?.genre?.name;
          return {
            day: String(date.getUTCDate()).padStart(2, '0'),
            month: MONTHS[date.getUTCMonth()],
            artist: e.name,
            venue: e._embedded?.venues?.[0]?.name || 'Paris',
            genre: (!genre || genre === 'Undefined') ? '—' : genre
          };
        });
        renderConcerts(concerts);
      };

      const script = document.createElement('script');
      script.src = url;
      script.onerror = () => {
        clearTimeout(timeout);
        delete window[callbackName];
        list.innerHTML = `<p style="color:rgba(255,100,100,0.5);font-size:0.85rem;padding:1rem 0">Couldn't load concerts. Check your API key.</p>`;
      };
      document.head.appendChild(script);
    }

    const concertsOverlay = document.getElementById('concerts-overlay');
    let concertsLoaded = false;
    function openConcerts() {
      concertsOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      if (!concertsLoaded) { fetchConcerts(); concertsLoaded = true; }
    }
    function closeConcerts() { concertsOverlay.classList.remove('open'); document.body.style.overflow = ''; }

    document.getElementById('concerts-btn').addEventListener('click', openConcerts);
    document.getElementById('concerts-close').addEventListener('click', closeConcerts);
    document.getElementById('concerts-overlay-bg').addEventListener('click', closeConcerts);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeOverlay(); closeConcerts(); } });
  </script>

</body>
</html>
